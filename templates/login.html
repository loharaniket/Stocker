{% extends "base.html" %}

{% block content %}
<div class="form-container animate-fade-in">
    <div class="text-center" style="margin-bottom: 2rem;">
        <div style="width: 60px; height: 60px; background: rgba(59, 130, 246, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; color: var(--accent-blue); font-size: 1.5rem;">
            <i class="fa-solid fa-lock"></i>
        </div>
        <h2>Welcome Back</h2>
        <p style="margin-bottom: 0;">Sign in to access your portfolio</p>
    </div>
    
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="email"><i class="fa-regular fa-envelope"></i> Email Address</label>
            <input type="email" id="email" name="email" required autofocus placeholder="john@example.com">
        </div>
        
        <div class="form-group">
            <label for="password"><i class="fa-solid fa-key"></i> Password</label>
            <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.875rem;">
            <i class="fa-solid fa-right-to-bracket"></i> Sign In
        </button>
    </form>
    
    <p class="text-center" style="margin-top: 2rem; font-size: 0.875rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
        Don't have an account? <a href="{{ url_for('signup') }}" class="text-gradient" style="text-decoration: none; font-weight: 600;">Sign Up</a>
    </p>
</div>
{% endblock %}
